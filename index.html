<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invitation Form</title>
    <link rel="stylesheet" href="styles/index.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Leckerli+One&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app">
      <aside>
        <span class="img-cone"></span>
        <span class="img-name-pare"></span>
        <p>Crie um convite digital para o seu evento</p>
      </aside>

      <main>
        <div class="main-container">
          <h1>Crie seu evento</h1>

          <form action="" method="post" enctype="multipart/form-data">
            <!-- action="" method="post" enctype="multipart/form-data" quer dizer que o formulário enviará dados binários (como arquivos) para o próprio servidor via uma requisição POST
           -->
            <fieldset>
              <div class="legend-container">
                <span class="calendar"></span>
                <legend>Sobre o evento</legend>
              </div>

              <div class="input-wrapper">
                <label for="title">Título</label>
                <input
                  type="text"
                  id="title"
                  name="title"
                  placeholder="Nome do evento"
                  required
                />
                <div class="error">
                  <img
                    src="assets/icons/alert-circle.svg"
                    alt="ícone de alerta vermelho"
                  />
                  <span>Campo obrigatório</span>
                </div>
              </div>

              <div class="grid">
                <div class="input-wrapper">
                  <label for="initial-date">Data inicial</label>
                  <input
                    type="text"
                    id="initial-date"
                    name="initial-date"
                    placeholder="DD/MM/AAAA, --:--"
                    required
                  />
                  <div class="error">
                    <img
                      src="assets/icons/alert-circle.svg"
                      alt="ícone de alerta vermelho"
                    />
                    <span>Campo obrigatório</span>
                  </div>
                </div>

                <div class="input-wrapper">
                  <label for="final-date">Data final</label>
                  <input
                    type="text"
                    id="final-date"
                    name="final-date"
                    placeholder="DD/MM/AAAA, --:--"
                    required
                  />
                  <div class="error">
                    <img
                      src="assets/icons/alert-circle.svg"
                      alt="ícone de alerta vermelho"
                    />
                    <span>Campo obrigatório</span>
                  </div>
                </div>

                <div class="input-wrapper">
                  <label>Tipo</label>
                  <div class="event-type">
                    <div class="presencial">
                      <span></span>
                      <input
                        type="radio"
                        id="presencial"
                        name="type"
                        value="presencial"
                        checked
                      />

                      <label for="presencial">Presencial</label>
                    </div>

                    <div class="online">
                      <span></span>
                      <input
                        type="radio"
                        id="online"
                        name="type"
                        value="online"
                      />
                      <label for="online">Online</label>
                    </div>
                  </div>
                </div>

                <div class="input-wrapper">
                  <label>Local</label>
                  <input
                    type="text"
                    id="location"
                    name="location"
                    placeholder="Link ou endereço"
                    required
                  />
                  <div class="error">
                    <img
                      src="assets/icons/alert-circle.svg"
                      alt="ícone de alerta vermelho"
                    />
                    <span>Campo obrigatório</span>
                  </div>
                </div>
              </div>

              <div class="input-wrapper">
                <label for="description-invite">Descrição</label>
                <textarea
                  name="description-invite"
                  id="description-invite"
                  cols="30"
                  rows="5"
                  placeholder="Escreva sobre os detalhes do evento"
                  required
                ></textarea>
                <div class="error">
                  <img
                    src="assets/icons/alert-circle.svg"
                    alt="ícone de alerta vermelho"
                  />
                  <span>Campo obrigatório</span>
                </div>
              </div>
            </fieldset>

            <fieldset class="personalization">
              <div class="legend-container">
                <span class="pincelsvg"></span>
                <legend>Personalização</legend>
              </div>

              <div class="input-wrapper">
                <label>Cor principal</label>
                <div
                  class="radio-wrapper"
                  role="group"
                  aria-labelledby="primary-color-label"
                >
                  <div
                    class="radio-inner"
                    style="background-color: var(--brand-light)"
                  >
                    <input
                      type="checkbox"
                      id="color-1"
                      name="colors[]"
                      value="brand-light"
                      aria-label="brand light"
                    />
                    <label for="color-1"></label>
                  </div>

                  <div
                    class="radio-inner"
                    style="background-color: var(--color-navy)"
                  >
                    <input
                      type="checkbox"
                      id="color-2"
                      name="colors[]"
                      value="navy"
                      aria-label="navy"
                    />
                    <label for="color-2"></label>
                  </div>

                  <div
                    class="radio-inner"
                    style="background-color: var(--color-purple)"
                  >
                    <input
                      type="checkbox"
                      id="color-3"
                      name="colors[]"
                      value="purple"
                      aria-label="purple"
                    />
                    <label for="color-3"></label>
                  </div>

                  <div
                    class="radio-inner"
                    style="background-color: var(--color-fuchsia)"
                  >
                    <input
                      type="checkbox"
                      id="color-4"
                      name="colors[]"
                      value="fuchsia"
                      aria-label="fuchsia"
                    />
                    <label for="color-4"></label>
                  </div>

                  <div
                    class="radio-inner"
                    style="background-color: var(--color-pink)"
                  >
                    <input
                      type="checkbox"
                      id="color-5"
                      name="colors[]"
                      value="pink"
                      aria-label="pink"
                    />
                    <label for="color-5"></label>
                  </div>

                  <div
                    class="radio-inner"
                    style="background-color: var(--color-danger)"
                  >
                    <input
                      type="checkbox"
                      id="color-6"
                      name="colors[]"
                      value="danger"
                      aria-label="danger"
                    />
                    <label for="color-6"></label>
                  </div>

                  <div
                    class="radio-inner"
                    style="background-color: var(--color-orange)"
                  >
                    <input
                      type="checkbox"
                      id="color-7"
                      name="colors[]"
                      value="orange"
                      aria-label="orange"
                    />
                    <label for="color-7"></label>
                  </div>

                  <div
                    class="radio-inner"
                    style="background-color: var(--color-yellow)"
                  >
                    <input
                      type="checkbox"
                      id="color-8"
                      name="colors[]"
                      value="yellow"
                      aria-label="yellow"
                    />
                    <label for="color-8"></label>
                  </div>

                  <div
                    class="radio-inner"
                    style="background-color: var(--color-lime)"
                  >
                    <input
                      type="checkbox"
                      id="color-9"
                      name="colors[]"
                      value="lime"
                      aria-label="lime"
                    />
                    <label for="color-9"></label>
                  </div>

                  <div
                    class="radio-inner"
                    style="background-color: var(--color-green)"
                  >
                    <input
                      type="checkbox"
                      id="color-10"
                      name="colors[]"
                      value="green"
                      aria-label="green"
                    />
                    <label for="color-10"></label>
                  </div>

                  <div
                    class="radio-inner"
                    style="background-color: var(--color-cyan)"
                  >
                    <input
                      type="checkbox"
                      id="color-11"
                      name="colors[]"
                      value="cyan"
                      aria-label="cyan"
                    />
                    <label for="color-11"></label>
                  </div>
                </div>
              </div>

              <div class="input-wrapper">
                <label>Tema do evento</label>
                <div class="grid-event-theme">
                  <label class="event-theme">
                    <input
                      type="checkbox"
                      id="birthday"
                      name="theme"
                      value="birthday"
                      checked
                    />
                    <img src="./assets/images/Image-1.svg" alt="Aniversário" />
                    <span for="birthday">Aniversário</span>
                  </label>

                  <label class="event-theme">
                    <input
                      type="checkbox"
                      id="infantil"
                      name="theme"
                      value="infantil"
                    />
                    <img src="./assets/images/Image.svg" alt="" />
                    <span for="infantil">Infantil</span>
                  </label>

                  <label class="event-theme">
                    <input
                      type="checkbox"
                      id="formatura"
                      name="theme"
                      value="formatura"
                    />
                    <img src="./assets/images/Image-11.svg" alt="" />
                    <span for="formatura">formatura</span>
                  </label>

                  <label class="event-theme">
                    <input
                      type="checkbox"
                      id="wedding"
                      name="theme"
                      value="casamento"
                    />
                    <img src="./assets/images/Image-2.svg" alt="" />
                    <span for="wedding">Casamento</span>
                  </label>

                  <label class="event-theme">
                    <input
                      type="checkbox"
                      id="chababy"
                      name="theme"
                      value="chababy"
                    />
                    <img src="./assets/images/Image-3.svg" alt="cha" />
                    <span for="chababy">Chá de bebê</span>
                  </label>

                  <label class="event-theme">
                    <input
                      type="checkbox"
                      id="chadepanela"
                      name="theme"
                      value="chadepanela"
                    />
                    <img src="./assets/images/Image-4.svg" alt="" />
                    <span for="chadepanela">Chá de panela</span>
                  </label>

                  <label class="event-theme">
                    <input
                      type="checkbox"
                      id="carnaval"
                      name="theme"
                      value="carnaval"
                    />
                    <img src="./assets/images/Image-5.svg" alt="" />
                    <span for="carnaval">Carnaval</span>
                  </label>

                  <label class="event-theme">
                    <input
                      type="checkbox"
                      id="pascoa"
                      name="theme"
                      value="pascoa"
                    />
                    <img src="./assets/images/Image-6.svg" alt="" />
                    <span for="pascoa">Páscoa</span>
                  </label>

                  <label class="event-theme">
                    <input
                      type="checkbox"
                      id="saojoao"
                      name="theme"
                      value="saojoao"
                    />
                    <img src="./assets/images/Image-7.svg" alt="" />
                    <span for="saojoao">São João</span>
                  </label>

                  <label class="event-theme">
                    <input
                      type="checkbox"
                      id="halloween"
                      name="theme"
                      value="halloween"
                    />
                    <img src="./assets/images/Image-8.svg" alt="" />
                    <span for="halloween">Halloween</span>
                  </label>

                  <label class="event-theme">
                    <input
                      type="checkbox"
                      id="natal"
                      name="theme"
                      value="natal"
                    />
                    <img src="./assets/images/Image-9.svg" alt="" />
                    <span for="natal">Natal</span>
                  </label>

                  <label class="event-theme">
                    <input
                      type="checkbox"
                      id="outro"
                      name="theme"
                      value="outro"
                    />
                    <img src="./assets/images/Image-10.svg" alt="" />
                    <span for="outro">Outro</span>
                  </label>
                </div>
              </div>

              <div class="flex">
                <div>
                  <label>Estilo</label>
                  <div class="flex-theme">
                    <div class="switch-theme">
                      <label for="escuro">
                        <input
                          type="radio"
                          id="escuro"
                          name="theme-style"
                          value="presencial"
                          checked
                        />
                      </label>

                      <label for="claro">
                        <input
                          type="radio"
                          id="claro"
                          name="theme-style"
                          value="claro"
                        />
                      </label>
                    </div>
                    <span class="escuro">Escuro</span>
                    <span class="claro">Claro</span>
                  </div>
                </div>

                <div class="input-file">
                  <label for="image">Foto de capa</label>
                  <div class="div-box">
                    <label for="image" class="input-style">
                      <span></span>
                      <p>Selecionar</p>
                    </label>
                    <input
                      type="file"
                      id="image"
                      name="image"
                      accept="image/*"
                      class="input-image"
                    />
                  </div>
                </div>
              </div>
            </fieldset>

            <fieldset>
              <div class="legend-container">
                <span class="contact"></span>
                <legend>Dados para contato</legend>
              </div>

              <div class="input-wrapper">
                <label for="fullname">Nome</label>
                <input
                  type="text"
                  id="fullname"
                  name="fullname"
                  placeholder="Nome Completo"
                  required
                />
                <div class="error">
                  <img
                    src="assets/icons/alert-circle.svg"
                    alt="ícone de alerta vermelho"
                  />
                  <span>Campo obrigatório</span>
                </div>
              </div>

              <div class="grid">
                <div class="input-wrapper">
                  <label for="email">E-mail</label>
                  <input
                    type="text"
                    id="email"
                    name="email"
                    placeholder="exemplo@email.com"
                    required
                  />
                  <div class="error">
                    <img
                      src="assets/icons/alert-circle.svg"
                      alt="ícone de alerta vermelho"
                    />
                    <span>Campo obrigatório</span>
                  </div>
                </div>

                <div class="input-wrapper">
                  <label for="phone">Telefone</label>
                  <input
                    type="text"
                    id="phone"
                    name="phone"
                    placeholder="(99) 99999-9999"
                    required
                  />
                  <div class="error">
                    <img
                      src="assets/icons/alert-circle.svg"
                      alt="ícone de alerta vermelho"
                    />
                    <span>Campo obrigatório</span>
                  </div>
                </div>
              </div>
            </fieldset>

            <hr />

            <footer>
              <div>
                <label for="term-op1">
                  <span></span>
                  <p>
                    Li e concordo com os <strong>Termos e Condições</strong> e
                    com a
                    <strong>Política de Privacidade</strong>
                  </p>
                </label>
                <input
                  type="checkbox"
                  id="term-op1"
                  name="terms"
                  value="terms1"
                />
              </div>

              <div>
                <label for="term-op2">
                  <span></span>
                  <p>Aceito receber atualizações e promoções por e-mail</p>
                </label>
                <input
                  type="checkbox"
                  id="term-op2"
                  name="terms"
                  value="terms2"
                />
              </div>

              <div>
                <label for="term-op3">
                  <span></span>
                  <p>Aceito receber atualizações e promoções por SMS</p>
                </label>
                <input
                  type="checkbox"
                  id="term-op3"
                  name="terms"
                  value="terms3"
                />
              </div>

              <div class="button-invite">
                <button>
                  <span></span>
                  <p>Gerar convite</p>
                </button>
              </div>
            </footer>
          </form>
        </div>
      </main>
    </div>
  </body>
</html>
